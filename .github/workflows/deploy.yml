name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    environment: Production
    steps:
      - name: Stop nasdash service
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $service = Get-Service -Name nasdash -ErrorAction SilentlyContinue
          if ($service) {
            Write-Host "Service nasdash found, attempting to shut it down..."
            Stop-Service -Name nasdash -Force
          } else {
            Write-Host "Service nasdash not found, skipping stop."
          }

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to deployment folder
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          robocopy "$env:GITHUB_WORKSPACE" "C:\nasdash" /E /XD .git /XF .gitignore
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Write .env file from secrets
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        env:
          PORT: ${{ secrets.PORT }}
          MUSIC_DIR: ${{ secrets.MUSIC_DIR }}
          YT_DLP_COMMAND: ${{ secrets.YT_DLP_COMMAND }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
          MONGO_LINKS_COLLECTION: ${{ secrets.MONGO_LINKS_COLLECTION }}
        run: |
          $envContent = @"
          PORT=$env:PORT
          MUSIC_DIR=$env:MUSIC_DIR
          YT_DLP_COMMAND=$env:YT_DLP_COMMAND
          MONGO_URI=$env:MONGO_URI
          MONGO_DB_NAME=$env:MONGO_DB_NAME
          MONGO_LINKS_COLLECTION=$env:MONGO_LINKS_COLLECTION
          "@
          $envContent = $envContent -replace '(?m)^\s+', ''
          Set-Content -Path "C:\nasdash\.env" -Value $envContent -Encoding UTF8
          Write-Host ".env file written to C:\nasdash\.env"

      - name: Install backend dependencies
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        working-directory: C:\nasdash
        run: npm install

      - name: Install frontend dependencies
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        working-directory: C:\nasdash\frontend
        run: npm install

      - name: Build frontend
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          Remove-Item -Recurse -Force "C:\nasdash\dist" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force "C:\nasdash\dist" | Out-Null
          Set-Location "C:\nasdash\frontend"
          npm run build
          Move-Item "C:\nasdash\frontend\dist\*" "C:\nasdash\dist\"

      - name: Start nasdash service
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: Start-Service -Name nasdash
